<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Support – Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090F;--surface:#0F0F1C;--card:#13131F;
  --border:#1E1E30;--border2:#2A2A40;
  --v:#6366F1;--v2:#4F46E5;--v3:#A5B4FC;
  --green:#10B981;--red:#EF4444;
  --text:#F0EFF8;--muted:#7A7A96;--r:14px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.page{display:flex;flex-direction:column;height:100vh;max-width:720px;margin:0 auto;padding:0 16px}
.header{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:1.1rem;flex-shrink:0;background:var(--v)}
.header-info h2{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700}
.header-info p{font-size:.75rem;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
.messages{flex:1;overflow-y:auto;padding:16px 0 8px;display:flex;flex-direction:column;gap:10px}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:.75rem;flex-shrink:0;background:var(--v);margin-top:2px}
.msg.user .msg-avatar{background:var(--border2)}
.bubble{padding:10px 14px;border-radius:var(--r);font-size:.875rem;line-height:1.6;word-break:break-word}
.msg.bot  .bubble{background:var(--card);border:1px solid var(--border2);border-radius:4px var(--r) var(--r) var(--r)}
.msg.user .bubble{background:var(--v);color:white;border-radius:var(--r) 4px var(--r) var(--r)}
.msg-time{font-size:.65rem;color:var(--muted);margin-top:3px}
.msg.user .msg-time{text-align:right}
.typing{display:flex;align-items:center;gap:4px;padding:12px 14px;background:var(--card);border:1px solid var(--border2);border-radius:4px var(--r) var(--r) var(--r)}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.handoff{background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.2);border-radius:var(--r);padding:14px;font-size:.83rem;line-height:1.7;color:var(--muted)}
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:6px 0 2px}
.qr-btn{background:transparent;border:1px solid var(--border2);color:var(--v3);padding:5px 12px;border-radius:100px;font-size:.78rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.qr-btn:hover{background:rgba(99,102,241,.12);border-color:var(--v)}
.input-area{flex-shrink:0;padding:8px 0 12px;border-top:1px solid var(--border)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-wrap{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:8px 14px;transition:border .2s}
.input-wrap:focus-within{border-color:var(--v)}
textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;resize:none;line-height:1.5;max-height:80px}
textarea::placeholder{color:var(--muted)}
.send-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:grid;place-items:center;transition:all .2s;flex-shrink:0}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn svg{width:16px;height:16px}
.rating-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border2);border-radius:var(--r);margin-top:4px}
.rating-bar p{font-size:.82rem;color:var(--muted);flex:1}
.stars{display:flex;gap:4px}
.star{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--border2);transition:color .15s;padding:0}
.star:hover,.star.on{color:#F59E0B}
#loading{display:flex;align-items:center;justify-content:center;height:100vh;gap:10px;color:var(--muted);font-size:.9rem}
.spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--v);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#error-state{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;text-align:center;padding:24px}
#error-state h2{font-family:'Syne',sans-serif;font-size:1.2rem}
#error-state p{color:var(--muted);font-size:.85rem;max-width:340px;line-height:1.6}
@media(max-width:480px){.page{padding:0 10px}.msg{max-width:92%}}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div> Loading chatbot…</div>

<div id="error-state">
  <div style="font-size:2.5rem">🤖</div>
  <h2>Chatbot not found</h2>
  <p id="error-msg">Invalid or missing credentials.</p>
</div>

<div class="page" id="chat-page" style="display:none">
  <div class="header">
    <div class="avatar" id="bot-avatar">🤖</div>
    <div class="header-info">
      <h2 id="bot-name">Support Bot</h2>
      <p><span class="status-dot"></span>Online · AI-powered</p>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div id="quick-replies" class="quick-replies"></div>
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="Type a message…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" style="background:var(--v)">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://tuhlbdxrmtluwrxsbtct.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1aGxiZHhybXRsdXdyeHNidGN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTU5NDUsImV4cCI6MjA4ODU5MTk0NX0.krJR766NAPYQmckHEds_zSDZ_h5KrncSvJ9bKXIfuqY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let company=null,intents=[],history=[],busy=false,sessionId=crypto.randomUUID(),rated=false,failCount=0;
const SIMILARITY_THRESHOLD=0.60,KEYWORD_THRESHOLD=0.40,MAX_FAILURES=3;

window.addEventListener('load', async () => {
  const params=new URLSearchParams(location.search);
  const apiKey=params.get('key'),companyId=params.get('company');
  try {
    let co=null;
    if (apiKey) {
      const {data,error}=await sb.from('companies').select('*').eq('api_key',apiKey).eq('is_active',true).single();
      if (error||!data){showError('Invalid API key or chatbot is inactive.');return;}
      co=data;
    } else if (companyId) {
      const {data,error}=await sb.from('companies').select('*').eq('id',companyId).eq('is_active',true).single();
      if (error||!data){showError('Company not found or chatbot is inactive.');return;}
      co=data;
    } else {
      showError('No credentials provided. Add <b>?key=YOUR_API_KEY</b> to the URL.');return;
    }
    company=co;
    const hex=co.primary_color||'#6366F1';
    document.documentElement.style.setProperty('--v',hex);
    document.documentElement.style.setProperty('--v2',shadeColor(hex,-20));
    document.getElementById('send-btn').style.background=hex;
    document.title=co.name+' – Chat';
    document.getElementById('bot-name').textContent=co.name+' Support';
    const {data:iv}=await sb.from('intents').select('*').eq('company_id',co.id).eq('is_active',true);
    intents=iv||[];
    document.getElementById('loading').style.display='none';
    document.getElementById('chat-page').style.display='flex';
    const isReturning=sessionStorage.getItem('ss_visited_'+co.id);
    sessionStorage.setItem('ss_visited_'+co.id,'1');
    const welcomeText=isReturning?'Welcome back! 👋 How can I help you today?':(co.welcome_message||'Hello! How can I help you today?');
    appendBot(welcomeText);
    showQuickReplies(intents.slice(0,4).map(i=>i.training_phrases?.[0]||i.name).filter(Boolean));
    document.getElementById('msg-input').focus();
  } catch(e){showError('Something went wrong. Please try again.');console.error(e);}
});

async function sendMessage() {
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if (!text||busy) return;
  input.value='';autoResize(input);clearQuickReplies();
  appendUser(text);history.push({role:'user',content:text});setBusy(true);
  const match=detectIntent(text,intents);
  if (match) {
    await delay(350+Math.random()*200);
    appendBot(match.response);history.push({role:'bot',content:match.response});
    failCount=0;setBusy(false);maybeShowRating();return;
  }
  showTyping();
  try {
    const res=await sb.functions.invoke('ai-chat',{body:{
      message:text,companyId:company?.id,companyName:company?.name,
      welcomeMessage:company?.welcome_message,
      personality:company?.bot_personality||'friendly',
      conversationHistory:history.slice(-6).map(m=>({sender:m.role==='user'?'user':'bot',content:m.content})),
    }});
    hideTyping();
    const reply=res.data?.response;
    if (reply){appendBot(reply);history.push({role:'bot',content:reply});failCount=0;}
    else handleFailure();
  } catch(e){hideTyping();handleFailure();}
  setBusy(false);maybeShowRating();
}

function handleFailure() {
  failCount++;
  if (failCount>=MAX_FAILURES) {
    const parts=["I'm sorry, I couldn't fully answer your question. Let me connect you with our team."];
    if (company?.whatsapp_number) parts.push('📱 WhatsApp: '+company.whatsapp_number);
    if (company?.support_email)   parts.push('📧 Email: '+company.support_email);
    appendHandoff(parts.join('\n\n'));failCount=0;
  } else {
    appendBot("I didn't quite understand that. Could you rephrase your question?");
  }
}

function maybeShowRating() {
  if (rated) return;
  if (history.filter(m=>m.role==='user').length<3) return;
  rated=true;
  const bar=document.createElement('div');bar.className='rating-bar';
  bar.innerHTML=`<p>Was this helpful?</p><div class="stars">${[1,2,3,4,5].map(n=>`<button class="star" onclick="submitRating(${n})" data-val="${n}">★</button>`).join('')}</div>`;
  document.getElementById('messages').appendChild(bar);scrollBottom();
}

async function submitRating(score) {
  document.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.val)<=score));
  document.querySelector('.rating-bar p').textContent='Thanks for your feedback!';
  document.querySelectorAll('.star').forEach(s=>s.disabled=true);
  try {await sb.from('ratings').insert({session_id:sessionId,company_id:company?.id,score});} catch(_){}
}

function detectIntent(message,intents) {
  const norm=normalize(message),active=intents.filter(i=>i.is_active);
  for (const i of active) for (const p of (i.training_phrases||[])) if (normalize(p)===norm) return i;
  let bestScore=0,bestIntent=null;
  for (const i of active) for (const p of (i.training_phrases||[])) {
    const s=similarity(normalize(p),norm);if(s>bestScore){bestScore=s;bestIntent=i;}
  }
  if (bestScore>=SIMILARITY_THRESHOLD) return bestIntent;
  const inputWords=new Set(norm.split(/\s+/));bestScore=0;bestIntent=null;
  for (const i of active) for (const p of (i.training_phrases||[])) {
    const pw=new Set(normalize(p).split(/\s+/));if(!pw.size)continue;
    const score=[...inputWords].filter(w=>pw.has(w)).length/pw.size;
    if(score>bestScore){bestScore=score;bestIntent=i;}
  }
  if (bestScore>=KEYWORD_THRESHOLD) return bestIntent;
  return null;
}

function normalize(t){return t.toLowerCase().trim().replace(/[^\w\s]/g,'').replace(/\s+/g,' ');}
function similarity(a,b){if(a===b)return 1;if(!a||!b)return 0;return 1-levenshtein(a,b)/Math.max(a.length,b.length);}
function levenshtein(s,t){
  const m=s.length,n=t.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(s[i-1]===t[j-1]?0:1));
  return dp[m][n];
}

function appendUser(text){const el=makeMsg('user');el.querySelector('.bubble').textContent=text;getMessages().appendChild(el);scrollBottom();}
function appendBot(text){const el=makeMsg('bot');el.querySelector('.bubble').innerHTML=esc(text).replace(/\n/g,'<br>');getMessages().appendChild(el);scrollBottom();}
function appendHandoff(text){
  const wrap=document.createElement('div');wrap.className='msg bot';
  wrap.innerHTML=`<div class="msg-avatar">🤖</div><div><div class="handoff">${esc(text).replace(/\n\n/g,'<br><br>')}</div><div class="msg-time">${timeStr()}</div></div>`;
  getMessages().appendChild(wrap);scrollBottom();
}
function makeMsg(role){
  const wrap=document.createElement('div');wrap.className=`msg ${role}`;
  wrap.innerHTML=`<div class="msg-avatar">${role==='bot'?'🤖':'👤'}</div><div><div class="bubble"></div><div class="msg-time">${timeStr()}</div></div>`;
  return wrap;
}
function showTyping(){
  const el=document.createElement('div');el.className='msg bot';el.id='typing-indicator';
  el.innerHTML=`<div class="msg-avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
  getMessages().appendChild(el);scrollBottom();
}
function hideTyping(){document.getElementById('typing-indicator')?.remove();}
function showQuickReplies(items){
  const el=document.getElementById('quick-replies');el.innerHTML='';
  items.forEach(txt=>{const btn=document.createElement('button');btn.className='qr-btn';btn.textContent=txt;btn.onclick=()=>{document.getElementById('msg-input').value=txt;sendMessage();};el.appendChild(btn);});
}
function clearQuickReplies(){document.getElementById('quick-replies').innerHTML='';}
function getMessages(){return document.getElementById('messages');}
function scrollBottom(){const m=getMessages();m.scrollTop=m.scrollHeight;}
function setBusy(b){busy=b;document.getElementById('send-btn').disabled=b;document.getElementById('msg-input').disabled=b;}
function autoResize(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,80)+'px';}
function timeStr(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
function showError(msg){document.getElementById('loading').style.display='none';const el=document.getElementById('error-state');el.style.display='flex';document.getElementById('error-msg').innerHTML=msg;}
function shadeColor(hex,amount){
  const num=parseInt(hex.replace('#',''),16);
  const r=Math.max(0,Math.min(255,(num>>16)+amount));
  const g=Math.max(0,Math.min(255,((num>>8)&0xFF)+amount));
  const b=Math.max(0,Math.min(255,(num&0xFF)+amount));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}
</script>
</body>
</html>
