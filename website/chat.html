<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Support AI — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090F;--surface:#0F0F1C;--card:#13131F;--border:#1E1E30;--border2:#2A2A40;
  --v:#6366F1;--v2:#4F46E5;--v3:#A5B4FC;--green:#10B981;--red:#EF4444;
  --text:#F0EFF8;--muted:#7A7A96;--r:14px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── Layout ── */
.page{display:flex;flex-direction:column;height:100vh;max-width:720px;margin:0 auto;padding:0 16px}

/* ── Header ── */
.header{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-size:1.1rem;flex-shrink:0;background:var(--v)}
.header-info h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700}
.header-info p{font-size:.78rem;color:var(--muted);margin-top:1px}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px}
.header-back{margin-left:auto;background:none;border:1px solid var(--border2);color:var(--muted);padding:6px 14px;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.header-back:hover{color:var(--text);border-color:var(--muted)}

/* ── Messages ── */
.messages{flex:1;overflow-y:auto;padding:20px 0 8px;display:flex;flex-direction:column;gap:12px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}

.msg-avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:.8rem;flex-shrink:0;background:var(--v);margin-top:2px}
.msg.user .msg-avatar{background:var(--border2)}

.bubble{padding:10px 14px;border-radius:var(--r);font-size:.875rem;line-height:1.6;word-break:break-word}
.msg.bot  .bubble{background:var(--card);border:1px solid var(--border2);border-radius:4px var(--r) var(--r) var(--r)}
.msg.user .bubble{background:var(--v);color:white;border-radius:var(--r) 4px var(--r) var(--r)}

.msg-time{font-size:.68rem;color:var(--muted);margin-top:4px;text-align:right}
.msg.bot .msg-time{text-align:left}

/* ── Typing indicator ── */
.typing{display:flex;align-items:center;gap:4px;padding:12px 14px;background:var(--card);border:1px solid var(--border2);border-radius:4px var(--r) var(--r) var(--r);width:fit-content}
.typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── Quick replies ── */
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0 4px}
.qr-btn{background:transparent;border:1px solid var(--border2);color:var(--v3);padding:6px 14px;border-radius:100px;font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.qr-btn:hover{background:rgba(99,102,241,.12);border-color:var(--v)}

/* ── Input area ── */
.input-area{padding:14px 0 20px;flex-shrink:0;border-top:1px solid var(--border)}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-wrap{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:12px;display:flex;align-items:flex-end;padding:6px 10px 6px 14px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--v)}
textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;resize:none;max-height:120px;line-height:1.5;padding:4px 0}
textarea::placeholder{color:var(--muted)}
.send-btn{width:40px;height:40px;border-radius:10px;background:var(--v);border:none;color:white;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:all .2s}
.send-btn:hover{background:var(--v2)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn svg{width:16px;height:16px}

/* ── Handoff ── */
.handoff{background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.2);border-radius:var(--r);padding:14px;font-size:.83rem;line-height:1.7;color:var(--muted)}
.handoff a{color:var(--v3);text-decoration:none}
.handoff a:hover{text-decoration:underline}

/* ── Loading state ── */
#loading{display:flex;align-items:center;justify-content:center;height:100vh;gap:10px;color:var(--muted);font-size:.9rem}
.spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--v);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Error state ── */
#error-state{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;text-align:center;padding:24px}
#error-state h2{font-family:'Syne',sans-serif;font-size:1.3rem}
#error-state p{color:var(--muted);font-size:.875rem;max-width:360px;line-height:1.6}
.try-btn{background:var(--v);color:white;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.875rem}

/* ── Responsive ── */
@media(max-width:480px){.page{padding:0 12px}.msg{max-width:94%}}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading"><div class="spin"></div> Loading chatbot…</div>

<!-- Error -->
<div id="error-state">
  <div style="font-size:2.5rem">🤖</div>
  <h2>Chatbot not found</h2>
  <p id="error-msg">No company ID provided. Add <code style="background:var(--surface);padding:2px 6px;border-radius:4px;color:var(--v3)">?company=YOUR_COMPANY_ID</code> to the URL.</p>
  <a href="/"><button class="try-btn">← Back to home</button></a>
</div>

<!-- Chat UI -->
<div class="page" id="chat-page" style="display:none">
  <div class="header">
    <div class="avatar" id="bot-avatar">🤖</div>
    <div class="header-info">
      <h2 id="bot-name">Support Bot</h2>
      <p><span class="status-dot"></span>Online · AI-powered</p>
    </div>
    <button class="header-back" onclick="window.location='/'">← Home</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div id="quick-replies" class="quick-replies"></div>
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="Type a message…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://tuhlbdxrmtluwrxsbtct.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1aGxiZHhybXRsdXdyeHNidGN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTU5NDUsImV4cCI6MjA4ODU5MTk0NX0.krJR766NAPYQmckHEds_zSDZ_h5KrncSvJ9bKXIfuqY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── State ─────────────────────────────────────────────────────────────
let company    = null;
let intents    = [];
let history    = [];   // [{role:'user'|'bot', content}]
let busy       = false;
let sessionId  = crypto.randomUUID();
const SIMILARITY_THRESHOLD = 0.60;
const KEYWORD_THRESHOLD    = 0.40;

// ── Bootstrap ─────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  const companyId = new URLSearchParams(location.search).get('company');
  if (!companyId) { showError('No company ID in URL. Use <b>?company=YOUR_COMPANY_ID</b>'); return; }

  const { data: co, error } = await sb.from('companies').select('*').eq('id', companyId).single();
  if (error || !co) { showError('Company not found. Check the ID and try again.'); return; }

  company = co;
  document.title = `${co.name} — Chat`;
  document.getElementById('bot-name').textContent = co.name + ' Support';

  // Brand color
  const hex = co.primary_color || '#6366F1';
  document.documentElement.style.setProperty('--v',  hex);
  document.documentElement.style.setProperty('--v2', shadeColor(hex, -15));

  // Load intents
  const { data: iv } = await sb.from('intents').select('*').eq('company_id', companyId).eq('is_active', true);
  intents = iv || [];

  // Show UI
  document.getElementById('loading').style.display = 'none';
  document.getElementById('chat-page').style.display = 'flex';

  // Welcome message
  appendBot(co.welcome_message || 'Hello! How can I help you today?');

  // Quick-reply suggestions from first intents
  showQuickReplies(intents.slice(0, 4).map(i => i.training_phrases?.[0] || i.name).filter(Boolean));

  document.getElementById('msg-input').focus();
});

// ── Send message ───────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || busy) return;

  input.value = '';
  autoResize(input);
  clearQuickReplies();
  appendUser(text);
  history.push({ role: 'user', content: text });
  setBusy(true);

  // Stage 1 & 2: Rule-based matching
  const match = detectIntent(text, intents);
  if (match) {
    await delay(400 + Math.random() * 300);
    const reply = match.response;
    appendBot(reply);
    history.push({ role: 'bot', content: reply });
    setBusy(false);
    return;
  }

  // Stage 3: AI fallback via edge function
  showTyping();
  try {
    const res = await sb.functions.invoke('ai-chat', {
      body: {
        message: text,
        companyId: company?.id,
        companyName: company?.name,
        welcomeMessage: company?.welcome_message,
        conversationHistory: history.slice(-6).map(m => ({ sender: m.role === 'user' ? 'user' : 'bot', content: m.content })),
      }
    });

    hideTyping();
    const reply = res.data?.response;
    if (reply) {
      appendBot(reply);
      history.push({ role: 'bot', content: reply });
    } else {
      const fallback = buildHandoff();
      appendHandoff(fallback);
      history.push({ role: 'bot', content: fallback });
    }
  } catch (e) {
    hideTyping();
    const fallback = buildHandoff();
    appendHandoff(fallback);
    history.push({ role: 'bot', content: fallback });
  }

  setBusy(false);
}

// ── Intent matching ────────────────────────────────────────────────────
function detectIntent(message, intents) {
  const norm = normalize(message);
  const active = intents.filter(i => i.is_active);

  // Exact match
  for (const i of active) {
    for (const p of (i.training_phrases || [])) {
      if (normalize(p) === norm) return i;
    }
  }

  // Levenshtein similarity
  let bestScore = 0, bestIntent = null;
  for (const i of active) {
    for (const p of (i.training_phrases || [])) {
      const s = similarity(normalize(p), norm);
      if (s > bestScore) { bestScore = s; bestIntent = i; }
    }
  }
  if (bestScore >= SIMILARITY_THRESHOLD) return bestIntent;

  // Keyword overlap
  const inputWords = new Set(norm.split(/\s+/));
  bestScore = 0; bestIntent = null;
  for (const i of active) {
    for (const p of (i.training_phrases || [])) {
      const pw = new Set(normalize(p).split(/\s+/));
      if (!pw.size) continue;
      const overlap = [...inputWords].filter(w => pw.has(w)).length;
      const score   = overlap / pw.size;
      if (score > bestScore) { bestScore = score; bestIntent = i; }
    }
  }
  if (bestScore >= KEYWORD_THRESHOLD) return bestIntent;

  return null;
}

function normalize(t) {
  return t.toLowerCase().trim().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ');
}

function similarity(a, b) {
  if (a === b) return 1.0;
  if (!a || !b) return 0;
  const d = levenshtein(a, b);
  return 1 - d / Math.max(a.length, b.length);
}

function levenshtein(s, t) {
  const m = s.length, n = t.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+(s[i-1]===t[j-1]?0:1));
  return dp[m][n];
}

// ── DOM helpers ────────────────────────────────────────────────────────
function appendUser(text) {
  const el = makeMsg('user');
  el.querySelector('.bubble').textContent = text;
  getMessages().appendChild(el);
  scrollBottom();
}

function appendBot(text) {
  const el = makeMsg('bot');
  el.querySelector('.bubble').innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
  getMessages().appendChild(el);
  scrollBottom();
}

function appendHandoff(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.innerHTML = `<div class="msg-avatar">🤖</div><div><div class="handoff">${escapeHtml(text).replace(/\n\n/g,'<br><br>')}</div><div class="msg-time">${timeStr()}</div></div>`;
  getMessages().appendChild(wrap);
  scrollBottom();
}

function makeMsg(role) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  wrap.innerHTML = `<div class="msg-avatar">${role==='bot'?'🤖':'👤'}</div><div><div class="bubble"></div><div class="msg-time">${timeStr()}</div></div>`;
  return wrap;
}

let typingEl = null;
function showTyping() {
  typingEl = document.createElement('div');
  typingEl.className = 'msg bot';
  typingEl.id = 'typing-indicator';
  typingEl.innerHTML = '<div class="msg-avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>';
  getMessages().appendChild(typingEl);
  scrollBottom();
}
function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function showQuickReplies(items) {
  const el = document.getElementById('quick-replies');
  el.innerHTML = '';
  items.forEach(txt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = txt;
    btn.onclick = () => { document.getElementById('msg-input').value = txt; sendMessage(); };
    el.appendChild(btn);
  });
}
function clearQuickReplies() { document.getElementById('quick-replies').innerHTML = ''; }

function getMessages() { return document.getElementById('messages'); }
function scrollBottom() { const m = getMessages(); m.scrollTop = m.scrollHeight; }
function setBusy(b) {
  busy = b;
  document.getElementById('send-btn').disabled = b;
  document.getElementById('msg-input').disabled = b;
}

function buildHandoff() {
  const parts = ["I'm sorry, I couldn't fully answer your question. Let me connect you with our support team."];
  if (company?.whatsapp_number) parts.push('📱 WhatsApp: ' + company.whatsapp_number);
  if (company?.support_email)   parts.push('📧 Email: ' + company.support_email);
  return parts.join('\n\n');
}

function showError(msg) {
  document.getElementById('loading').style.display  = 'none';
  document.getElementById('error-state').style.display = 'flex';
  document.getElementById('error-msg').innerHTML = msg;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeStr() {
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function shadeColor(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  const t = pct < 0 ? 0 : 255, p = pct < 0 ? pct * -1 : pct;
  const R = (n >> 16) + Math.round((t - (n >> 16)) * p / 100);
  const G = (n >> 8 & 0x00FF) + Math.round((t - (n >> 8 & 0x00FF)) * p / 100);
  const B = (n & 0x0000FF) + Math.round((t - (n & 0x0000FF)) * p / 100);
  return '#' + [R, G, B].map(v => Math.min(255, Math.max(0, v)).toString(16).padStart(2,'0')).join('');
}
</script>
</body>
</html>
