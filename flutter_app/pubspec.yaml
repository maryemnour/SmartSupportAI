name: smart_support_ai
description: Smart Support AI - Multi-tenant SaaS Chatbot Platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  http: ^1.2.1

  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1

  # Storage & Cache
  shared_preferences: ^2.3.2

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  url_launcher: ^6.3.0
  file_picker: ^8.0.3
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
